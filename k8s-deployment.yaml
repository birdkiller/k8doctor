# K8s Doctor 部署清单
# 用于将诊断工具部署到目标 K8s 集群

---
# Namespace（可选，隔离诊断工具）
apiVersion: v1
kind: Namespace
metadata:
  name: k8doctor
  labels:
    name: k8doctor
    purpose: diagnostics

---
# ServiceAccount（用于诊断需要读取集群资源）
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8doctor
  namespace: k8doctor

---
# ClusterRole（授予只读权限，可以查看 pods, nodes, events 等）
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8doctor-reader
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - endpoints
      - nodes
      - events
      - namespaces
      - configmaps
      - secrets
    verbs:
      - get
      - list
      - watch
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs:
      - get
      - list
      - watch
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs:
      - get
      - list
      - watch
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
      - persistentvolumeclaims
    verbs:
      - get
      - list
      - watch

---
# ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8doctor-reader-binding
subjects:
  - kind: ServiceAccount
    name: k8doctor
    namespace: k8doctor
roleRef:
  kind: ClusterRole
  name: k8doctor-reader
  apiGroup: rbac.authorization.k8s.io

---
# ConfigMap：存储诊断工具的配置和知识库挂载点
apiVersion: v1
kind: ConfigMap
metadata:
  name: k8doctor-config
  namespace: k8doctor
data:
  KB_PATH: "/app/kb"
  EMBEDDINGS_PATH: "/app/embeddings"

---
# Pod：诊断工具主容器
apiVersion: v1
kind: Pod
metadata:
  name: k8doctor
  namespace: k8doctor
  labels:
    app: k8doctor
    version: v1
spec:
  serviceAccountName: k8doctor
  
  # 调试时保留容器，方便 exec 进入
  # 生产环境可以删除这行实现自动清理
  # terminationGracePeriodSeconds: 0
  
  containers:
    - name: k8doctor
      image: k8doctor:latest
      imagePullPolicy: IfNotPresent
      
      # 交互式诊断模式
      command: ["/app/k8doctor"]
      args: ["diagnose-i"]
      
      # TTY 和 stdin 保持打开，允许交互
      tty: true
      stdin: true
      
      # 资源限制
      resources:
        requests:
          memory: "128Mi"
          cpu: "100m"
        limits:
          memory: "512Mi"
          cpu: "500m"
      
      # 环境变量
      env:
        - name: K8DOCTOR_KB_PATH
          valueFrom:
            configMapKeyRef:
              name: k8doctor-config
              key: KB_PATH
        - name: K8DOCTOR_EMBEDDINGS_PATH
          valueFrom:
            configMapKeyRef:
              name: k8doctor-config
              key: EMBEDDINGS_PATH
      
      # 挂载知识库（可读写，方便更新知识库）
      volumeMounts:
        - name: kb-volume
          mountPath: /app/kb
          readOnly: true
        - name: embeddings-volume
          mountPath: /app/embeddings
          readOnly: true
      
      # 健康检查
      livenessProbe:
        exec:
          command:
            - /app/k8doctor
            - list
        initialDelaySeconds: 10
        periodSeconds: 30
      
  # 挂载卷
  volumes:
    - name: kb-volume
      configMap:
        name: k8doctor-kb
    - name: embeddings-volume
      emptyDir: {}

---
# ConfigMap：存储知识库文件
# 注意：实际部署时应该将 kb/ 目录的内容放入此 ConfigMap
# 或者使用 PV/PVC 挂载
apiVersion: v1
kind: ConfigMap
metadata:
  name: k8doctor-kb
  namespace: k8doctor
binaryData:
  # 占位符，实际部署时需要替换为真实的知识库文件
  # 可以使用 data: 而非 binaryData:
  placeholder: "base64_ZGVmYXVsdA=="
